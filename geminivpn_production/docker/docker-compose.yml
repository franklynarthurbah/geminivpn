# =============================================================================
# GeminiVPN Docker Compose — Production
# Domain: geminivpn.access.ly
# =============================================================================

version: '3.8'

services:

  postgres:
    image: postgres:16-alpine
    container_name: geminivpn-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-geminivpn}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-geminivpn}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d:ro
    networks:
      - geminivpn-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-geminivpn}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: geminivpn-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - geminivpn-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: geminivpn-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${DB_USER:-geminivpn}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-geminivpn}?schema=public
      NODE_ENV: production
      PORT: 5000
      HOST: 0.0.0.0
      FRONTEND_URL: https://geminivpn.access.ly
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRY: ${JWT_ACCESS_EXPIRY:-15m}
      JWT_REFRESH_EXPIRY: ${JWT_REFRESH_EXPIRY:-7d}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      STRIPE_MONTHLY_PRICE_ID: ${STRIPE_MONTHLY_PRICE_ID}
      STRIPE_YEARLY_PRICE_ID: ${STRIPE_YEARLY_PRICE_ID}
      STRIPE_TWO_YEAR_PRICE_ID: ${STRIPE_TWO_YEAR_PRICE_ID}
      WIREGUARD_ENABLED: ${WIREGUARD_ENABLED:-true}
      WIREGUARD_CONFIG_PATH: /etc/wireguard
      WIREGUARD_INTERFACE: ${WIREGUARD_INTERFACE:-wg0}
      WIREGUARD_SERVER_PRIVATE_KEY: ${WIREGUARD_SERVER_PRIVATE_KEY}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM:-noreply@geminivpn.access.ly}
      WHATSAPP_SUPPORT_NUMBER: ${WHATSAPP_SUPPORT_NUMBER}
      SUPPORT_EMAIL: ${SUPPORT_EMAIL:-support@geminivpn.access.ly}
      BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-12}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-900000}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-100}
      ENABLE_TRIAL: ${ENABLE_TRIAL:-true}
      TRIAL_DURATION_DAYS: ${TRIAL_DURATION_DAYS:-3}
      ENABLE_SELF_HEALING: ${ENABLE_SELF_HEALING:-true}
      AUTO_REFRESH_INTERVAL_MS: ${AUTO_REFRESH_INTERVAL_MS:-30000}
      MAX_RECONNECT_ATTEMPTS: ${MAX_RECONNECT_ATTEMPTS:-5}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - wireguard_config:/etc/wireguard
      - backend_logs:/app/logs
    ports:
      - "51820:51820/udp"
    networks:
      - geminivpn-network
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv4.ip_forward=1
      - net.ipv6.conf.all.forwarding=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  nginx:
    image: nginx:1.25-alpine
    container_name: geminivpn-nginx
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt/live/geminivpn.access.ly/fullchain.pem:/etc/nginx/ssl/fullchain.pem:ro
      - /etc/letsencrypt/live/geminivpn.access.ly/privkey.pem:/etc/nginx/ssl/privkey.pem:ro
      - frontend_dist:/var/www/geminivpn:ro
      - nginx_logs:/var/log/nginx
      - certbot_webroot:/var/www/certbot:ro
    ports:
      - "80:80"
      - "443:443"
    networks:
      - geminivpn-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  wireguard_config:
    driver: local
  backend_logs:
    driver: local
  nginx_logs:
    driver: local
  frontend_dist:
    driver: local
  certbot_webroot:
    driver: local

networks:
  geminivpn-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
