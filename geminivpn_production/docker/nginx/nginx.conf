# =============================================================================
# GeminiVPN Nginx Configuration
# Domain: geminivpn.access.ly
# =============================================================================

user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging format
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';
    access_log  /var/log/nginx/access.log  main;

    # Performance
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    types_hash_max_size 2048;
    server_tokens   off;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        application/xml
        application/xml+rss
        application/rss+xml
        application/atom+xml
        image/svg+xml
        font/truetype
        font/opentype
        application/vnd.ms-fontobject;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=general:10m rate=60r/m;

    # Upstream backend
    upstream backend {
        server backend:5000;
        keepalive 32;
    }

    # -------------------------------------------------------------------------
    # HTTP → HTTPS redirect
    # -------------------------------------------------------------------------
    server {
        listen 80;
        listen [::]:80;
        server_name geminivpn.access.ly www.geminivpn.access.ly;

        # Allow certbot ACME challenges through
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # -------------------------------------------------------------------------
    # HTTPS main server
    # -------------------------------------------------------------------------
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name geminivpn.access.ly www.geminivpn.access.ly;

        # SSL — Let's Encrypt certificates mounted from host
        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        # Modern SSL settings (TLS 1.2 + 1.3 only)
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # HSTS (2 years)
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        # Logging
        access_log /var/log/nginx/geminivpn-access.log main;
        error_log  /var/log/nginx/geminivpn-error.log warn;

        # Client body size limit
        client_max_body_size 10m;

        # -----------------------------------------------------------------------
        # API routes → backend
        # -----------------------------------------------------------------------
        location /api/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection 'upgrade';
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 90s;
            proxy_connect_timeout 10s;
        }

        # Auth routes — stricter rate limit
        location /api/v1/auth/ {
            limit_req zone=auth burst=5 nodelay;

            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # -----------------------------------------------------------------------
        # WebSocket (real-time connection status)
        # -----------------------------------------------------------------------
        location /ws/ {
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400s;
        }

        # -----------------------------------------------------------------------
        # Health check (no rate limit, no auth)
        # -----------------------------------------------------------------------
        location /health {
            proxy_pass          http://backend/health;
            proxy_http_version  1.1;
            proxy_set_header    Host $host;
            access_log          off;
            add_header          Cache-Control "no-cache";
        }

        # WhatsApp support redirect
        location /support/whatsapp {
            proxy_pass http://backend/support/whatsapp;
        }

        # -----------------------------------------------------------------------
        # Static frontend assets (long cache)
        # -----------------------------------------------------------------------
        location /assets/ {
            root  /var/www/geminivpn;
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # Service worker — no cache
        location = /sw.js {
            root /var/www/geminivpn;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Service-Worker-Allowed "/";
        }

        # PWA manifest
        location = /manifest.json {
            root /var/www/geminivpn;
            add_header Cache-Control "public, max-age=86400";
        }

        # Images & media
        location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
            root /var/www/geminivpn;
            expires 7d;
            add_header Cache-Control "public, max-age=604800";
            access_log off;
        }

        # -----------------------------------------------------------------------
        # SPA fallback — all other routes serve index.html
        # -----------------------------------------------------------------------
        location / {
            root  /var/www/geminivpn;
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "no-cache";
        }
    }
}
