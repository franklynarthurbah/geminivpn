# GeminiVPN — Production Nginx Configuration
# FIXED: IPv4/IPv6 explicit bindings, default_server catch-all, HSTS safe mode,
#        ssl_stapling disabled until LE cert confirmed, resolver IPv4-only flag

user  nginx;
worker_processes  auto;
worker_rlimit_nofile 65535;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rt=$request_time';
    access_log /var/log/nginx/access.log main buffer=16k flush=5s;

    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  75;
    keepalive_requests 1000;
    server_tokens      off;
    client_max_body_size 500M;

    open_file_cache          max=10000 inactive=30s;
    open_file_cache_valid    60s;
    open_file_cache_min_uses 2;
    open_file_cache_errors   on;

    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_min_length   256;
    gzip_buffers      16 8k;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml text/javascript image/svg+xml
               font/woff font/woff2 application/wasm;

    limit_req_zone $binary_remote_addr zone=api:10m      rate=60r/m;
    limit_req_zone $binary_remote_addr zone=auth:10m     rate=30r/m;
    limit_req_zone $binary_remote_addr zone=general:10m  rate=120r/m;
    limit_req_zone $binary_remote_addr zone=download:10m rate=20r/m;

    proxy_buffers           8 16k;
    proxy_buffer_size       32k;
    proxy_busy_buffers_size 64k;
    proxy_temp_file_write_size 64k;

    # Docker internal DNS — resolves 'backend' container name
    # ipv6=off forces IPv4-only resolution (prevents AAAA lookup failures)
    resolver 127.0.0.11 valid=15s ipv6=off;
    resolver_timeout 5s;

    upstream backend {
        server backend:5000;
        keepalive 64;
        keepalive_requests 500;
        keepalive_timeout  60s;
    }

    # ─── DEFAULT catch-all HTTP (IP access + unknown hostnames) ──────────────
    # CRITICAL: Without default_server, nginx returns nothing for IP access →
    # ERR_CONNECTION_TIMED_OUT. This block catches all unmatched requests.
    # listen on 0.0.0.0 (IPv4) explicitly. [::] covered by bindv6only=0 sysctl.
    server {
        listen 0.0.0.0:80 default_server;
        listen [::]:80 default_server ipv6only=on;
        server_name _;

        # Let's Encrypt HTTP-01 challenge (certbot standalone uses this)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
            try_files $uri =404;
        }

        location = /health {
            proxy_pass http://backend/health;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            access_log off;
        }

        # Redirect everything else to HTTPS on canonical domain
        location / {
            return 301 https://geminivpn.zapto.org$request_uri;
        }
    }

    # ─── Canonical domain HTTP → HTTPS redirect ───────────────────────────────
    server {
        listen 0.0.0.0:80;
        server_name geminivpn.zapto.org;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
            try_files $uri =404;
        }

        location = /health {
            proxy_pass http://backend/health;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            access_log off;
        }

        location / {
            return 301 https://geminivpn.zapto.org$request_uri;
        }
    }

    # ─── DEFAULT catch-all HTTPS (IP access + unknown hostnames) ─────────────
    # Catches requests to raw IP over HTTPS. Redirects to canonical domain.
    # Uses same cert as main server — self-signed fallback created by pre-start.sh
    server {
        listen 0.0.0.0:443 ssl default_server;
        listen [::]:443 ssl default_server ipv6only=on;
        http2 on;
        server_name _;

        ssl_certificate     /etc/letsencrypt/live/geminivpn.zapto.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/geminivpn.zapto.org/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:TLS_AES_128_GCM_SHA256:TLS_AES_256_GCM_SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:50m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        location = /health {
            proxy_pass http://backend/health;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            access_log off;
        }

        location / {
            return 301 https://geminivpn.zapto.org$request_uri;
        }
    }

    # ─── MAIN HTTPS server — geminivpn.zapto.org ──────────────────────────────
    server {
        listen 0.0.0.0:443 ssl;
        http2 on;
        server_name geminivpn.zapto.org;

        ssl_certificate     /etc/letsencrypt/live/geminivpn.zapto.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/geminivpn.zapto.org/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:TLS_AES_128_GCM_SHA256:TLS_AES_256_GCM_SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:50m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # ssl_stapling ON only after LE cert confirmed (enabled by phase_ssl → _enable_ssl_stapling)
        # ssl_stapling        on;
        # ssl_stapling_verify on;
        # resolver            1.1.1.1 8.8.8.8 valid=300s;

        # Security headers
        add_header X-Frame-Options           "SAMEORIGIN"                      always;
        add_header X-Content-Type-Options    "nosniff"                         always;
        add_header X-XSS-Protection          "1; mode=block"                   always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        # HSTS: 1 year, includeSubDomains. Remove 'preload' until submitted to hstspreload.org
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        # CSP: covers all 4 payment providers
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://js.stripe.com https://web.squarecdn.com https://sandbox.web.squarecdn.com https://cdn.paddle.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https://api.stripe.com https://connect.squareup.com https://pci-connect.squareupsandbox.com https://api.paddle.com https://sandbox-api.paddle.com https://api.commerce.coinbase.com https://wa.me; frame-src https://js.stripe.com https://buy.paddle.com https://checkout.paddle.com https://sandbox-buy.paddle.com;" always;

        # ─── Logo — served at root (before SPA loads) ────────────────────────
        location = /geminivpn-logo.png {
            root /var/www/geminivpn;
            expires 7d;
            add_header Cache-Control "public, must-revalidate";
            access_log off;
            try_files /geminivpn-logo.png =404;
        }

        # ─── Downloads ───────────────────────────────────────────────────────
        location /downloads/ {
            limit_req zone=download burst=10 nodelay;
            alias /var/www/geminivpn/downloads/;
            autoindex off;
            add_header X-Content-Type-Options "nosniff";
        }
        location ~* ^/downloads/.*\.(zip|tar\.gz|gz|sh|ps1|conf|apk|exe|dmg)$ {
            alias /var/www/geminivpn/downloads/;
            add_header Content-Disposition "attachment";
            add_header X-Content-Type-Options "nosniff";
            expires 7d;
        }

        # ─── PWA Manifest ────────────────────────────────────────────────────
        location = /manifest.json {
            root /var/www/geminivpn;
            default_type application/manifest+json;
            add_header Access-Control-Allow-Origin "*";
            expires 1h;
        }

        # ─── Auth (strict rate limit) ─────────────────────────────────────────
        location /api/v1/auth/ {
            limit_req zone=auth burst=20 nodelay;
            proxy_pass             http://backend;
            proxy_http_version     1.1;
            proxy_set_header       Connection        "";
            proxy_set_header       Host              $host;
            proxy_set_header       X-Real-IP         $remote_addr;
            proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header       X-Forwarded-Proto $scheme;
            proxy_read_timeout     30;
            proxy_connect_timeout  10;
        }

        # ─── WebSocket ────────────────────────────────────────────────────────
        location /api/ws {
            proxy_pass             http://backend;
            proxy_http_version     1.1;
            proxy_set_header       Upgrade           $http_upgrade;
            proxy_set_header       Connection        "upgrade";
            proxy_set_header       Host              $host;
            proxy_set_header       X-Real-IP         $remote_addr;
            proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header       X-Forwarded-Proto $scheme;
            proxy_read_timeout     3600;
        }

        # ─── All API ──────────────────────────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=60 nodelay;
            proxy_pass             http://backend;
            proxy_http_version     1.1;
            proxy_set_header       Connection        "";
            proxy_set_header       Host              $host;
            proxy_set_header       X-Real-IP         $remote_addr;
            proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header       X-Forwarded-Proto $scheme;
            proxy_read_timeout     300;
            proxy_connect_timeout  15;
            proxy_send_timeout     60;
            proxy_next_upstream         error timeout http_502 http_503 http_504;
            proxy_next_upstream_tries   2;
            proxy_next_upstream_timeout 10s;
        }

        # ─── Health check ─────────────────────────────────────────────────────
        location = /health {
            proxy_pass        http://backend/health;
            proxy_set_header  Host $host;
            proxy_set_header  X-Real-IP $remote_addr;
            access_log        off;
        }

        # ─── Support redirects (WhatsApp) ─────────────────────────────────────
        location /support/ {
            proxy_pass             http://backend;
            proxy_http_version     1.1;
            proxy_set_header       Connection        "";
            proxy_set_header       Host              $host;
            proxy_set_header       X-Real-IP         $remote_addr;
            proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header       X-Forwarded-Proto $scheme;
            proxy_read_timeout     15;
            proxy_connect_timeout  10;
        }

        # ─── Static assets (hashed — aggressive cache) ────────────────────────
        location ~* \.(js|css|woff|woff2|ttf)$ {
            root /var/www/geminivpn;
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        location ~* \.(png|jpg|jpeg|gif|ico|svg|webp|avif)$ {
            root /var/www/geminivpn;
            expires 30d;
            add_header Cache-Control "public, must-revalidate";
            access_log off;
        }

        location = /sw.js {
            root /var/www/geminivpn;
            expires -1;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }

        # ─── React SPA fallback ───────────────────────────────────────────────
        location / {
            root /var/www/geminivpn;
            try_files $uri $uri/ /index.html;
            limit_req zone=general burst=100 nodelay;
            expires -1;
            add_header Cache-Control "no-cache, must-revalidate";
        }
    }
}
