    <!--
      FIX 3: Google Fonts — Non-blocking font loading.
      CSS @import is RENDER-BLOCKING: the browser must download, parse, and apply
      the CSS before it can paint anything. This adds 100-300ms of blank screen.
      Solution: use <link rel="preload"> + onload trick so fonts load in parallel.
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Preload: tells browser to fetch font CSS at high priority, non-blocking -->
    <link rel="preload" as="style"
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap"
      onload="this.onload=null;this.rel='stylesheet'" />
    <!-- Fallback for JS-disabled browsers -->
    <noscript>
      <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" />
    </noscript>

    <!-- Preload hero image — gives browser earliest possible signal to fetch it -->
    <link rel="preload" as="image" href="/hero_city.jpg" fetchpriority="high" />

    <!-- Inline critical above-fold CSS — eliminates render-blocking stylesheet for nav/hero -->
    <style>
      /* Minimal critical CSS to paint nav + hero without FOUC */
      body { margin: 0; background: #070A12; color: #fff; font-family: Inter, sans-serif; }
      #root { min-height: 100vh; }
      /* Prevent layout shift while fonts load */
      h1, h2, h3, h4, h5, h6 { font-family: Orbitron, sans-serif; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker
            .register('/sw.js')
            .then((reg) => console.log('[SW] Registered:', reg.scope))
            .catch((err) => console.warn('[SW] Registration failed:', err));
        });
      }
    </script>
  </body>
</html>
