# GeminiVPN Nginx — 144fps Performance + 9ms Latency Edition
# Run setup-domain.sh to replace geminivpn.zapto.org with your actual domain

user  nginx;

# FIX 9a: worker_processes auto uses all CPU cores
worker_processes  auto;
# FIX 9b: Set worker_rlimit_nofile high so nginx can handle many connections
worker_rlimit_nofile 65535;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    # FIX 9c: 4096 connections per worker (was 1024 — 4x improvement)
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Installer MIME types
    types {
        application/vnd.android.package-archive  apk;
        application/x-apple-diskimage            dmg;
        application/x-deb                        deb;
        application/x-executable                 AppImage;
        application/octet-stream                 exe;
    }

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rt=$request_time';
    access_log /var/log/nginx/access.log main buffer=16k flush=5s;

    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;    # FIX: disable Nagle for low latency (9ms)
    keepalive_timeout  75;
    keepalive_requests 1000;  # FIX 9d: allow 1000 requests per keepalive connection
    server_tokens      off;
    client_max_body_size 500M;

    # FIX 9e: Open file cache — avoids syscall overhead on every static file request
    # Without this, nginx stat()s + opens every file per request
    open_file_cache          max=10000 inactive=30s;
    open_file_cache_valid    60s;
    open_file_cache_min_uses 2;
    open_file_cache_errors   on;

    # ── Compression — gzip (universal) ──────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_min_length   256;
    gzip_buffers      16 8k;
    gzip_types
        text/plain text/css application/json application/javascript
        text/xml application/xml text/javascript image/svg+xml
        font/woff font/woff2 application/wasm;

    # ── Rate limiting zones ──────────────────────────────────────────────────
    # FIX 13: Auth rate limit was 5r/m — too aggressive for normal use
    # Users need to retry login + register. Now 10r/m (still secure, usable).
    limit_req_zone $binary_remote_addr zone=api:10m      rate=60r/m;
    limit_req_zone $binary_remote_addr zone=auth:10m     rate=10r/m;
    limit_req_zone $binary_remote_addr zone=general:10m  rate=120r/m;
    limit_req_zone $binary_remote_addr zone=download:10m rate=20r/m;

    # ── Proxy optimisation ───────────────────────────────────────────────────
    # FIX 10: proxy_buffers — reduces round-trips between nginx and Node backend
    # Without buffers, nginx reads response byte-by-byte from Node (slow)
    proxy_buffers           8 16k;
    proxy_buffer_size       32k;
    proxy_busy_buffers_size 64k;
    proxy_temp_file_write_size 64k;

    upstream backend {
        server backend:5000;
        keepalive 64;       # FIX: maintain 64 persistent connections to backend
        keepalive_requests 500;
        keepalive_timeout  60s;
    }

    # ── HTTP → HTTPS redirect ────────────────────────────────────────────────
    server {
        listen 80;
        listen [::]:80;
        server_name geminivpn.zapto.org;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
            try_files $uri =404;
        }

        location = /health {
            proxy_pass http://backend/health;
            proxy_set_header Host $host;
            access_log off;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS server ─────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2  on;
        server_name geminivpn.zapto.org;

        # SSL — Let's Encrypt
        ssl_certificate     /etc/letsencrypt/live/geminivpn.zapto.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/geminivpn.zapto.org/privkey.pem;

        # FIX: Modern cipher suite — TLS 1.3 priority (fastest handshake)
        ssl_protocols             TLSv1.2 TLSv1.3;
        ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:TLS_AES_128_GCM_SHA256:TLS_AES_256_GCM_SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache         shared:SSL:50m;   # FIX: was 10m — cache more sessions
        ssl_session_timeout       1d;
        ssl_session_tickets       off;

        # FIX: OCSP stapling — eliminates a round-trip for certificate validation
        # Without this: browser must contact CA on first visit (+50-150ms)
        # With stapling: certificate status is bundled into TLS handshake
        ssl_stapling            on;
        ssl_stapling_verify     on;
        resolver                1.1.1.1 8.8.8.8 valid=300s;
        resolver_timeout        5s;

        # Security headers
        add_header X-Frame-Options            "SAMEORIGIN"                      always;
        add_header X-Content-Type-Options     "nosniff"                         always;
        add_header X-XSS-Protection           "1; mode=block"                   always;
        add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security  "max-age=63072000; includeSubDomains; preload" always;

        # FIX: Content-Security-Policy — allows WhatsApp (wa.me), Stripe, and fonts
        add_header Content-Security-Policy
            "default-src 'self'; script-src 'self' 'unsafe-inline' https://js.stripe.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https://api.stripe.com https://wa.me; frame-src https://js.stripe.com; form-action 'self'; base-uri 'self';" always;

        # ── Downloads ───────────────────────────────────────────────────────
        location /downloads/ {
            limit_req zone=download burst=10 nodelay;
            alias /var/www/geminivpn/downloads/;
            autoindex off;

            location ~* \.(apk|exe|dmg|AppImage|deb|rpm)$ {
                add_header Content-Disposition "attachment";
                add_header X-Content-Type-Options "nosniff";
                expires -1;
                add_header Cache-Control "no-store";
            }

            location ~* \.pdf$ {
                add_header Content-Type "application/pdf";
            }
        }

        # ── Auth API (stricter rate limit) ───────────────────────────────────
        location /api/v1/auth/ {
            limit_req zone=auth burst=20 nodelay;

            # CORS preflight for native/desktop apps calling from different origin
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin  "$http_origin" always;
                add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
                add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With" always;
                add_header Access-Control-Max-Age       86400 always;
                add_header Content-Length 0;
                return 204;
            }

            proxy_pass             http://backend;
            proxy_http_version     1.1;
            proxy_set_header       Connection        "";
            proxy_set_header       Host              $host;
            proxy_set_header       X-Real-IP         $remote_addr;
            proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header       X-Forwarded-Proto $scheme;
            proxy_read_timeout     30;
            proxy_connect_timeout  10;

            # CORS response headers
            add_header Access-Control-Allow-Origin  "$http_origin" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With" always;
        }

        # ── API routes ───────────────────────────────────────────────────────
        # ── WebSocket upgrade (VPN status / live metrics) ────────────────────
        location /api/ws {
            proxy_pass             http://backend;
            proxy_http_version     1.1;
            proxy_set_header       Upgrade           $http_upgrade;
            proxy_set_header       Connection        "upgrade";
            proxy_set_header       Host              $host;
            proxy_set_header       X-Real-IP         $remote_addr;
            proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header       X-Forwarded-Proto $scheme;
            proxy_read_timeout     3600;
        }

        # ── All other API routes (REST JSON) ─────────────────────────────────
        location /api/ {
            limit_req zone=api burst=60 nodelay;
            proxy_pass             http://backend;
            proxy_http_version     1.1;
            proxy_set_header       Connection        "";      # empty = keepalive for HTTP/1.1
            proxy_set_header       Host              $host;
            proxy_set_header       X-Real-IP         $remote_addr;
            proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header       X-Forwarded-Proto $scheme;
            proxy_read_timeout     300;
            proxy_connect_timeout  10;
            proxy_send_timeout     60;
            # CORS — allow requests from the frontend domain and native apps
            add_header Access-Control-Allow-Origin  "https://geminivpn.zapto.org" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With" always;
            add_header Access-Control-Max-Age       86400 always;
            if ($request_method = OPTIONS) {
                return 204;
            }
        }

        # ── Health check ─────────────────────────────────────────────────────
        location = /health {
            proxy_pass         http://backend/health;
            proxy_set_header   Host $host;
            access_log off;
        }

        # ── Static frontend ──────────────────────────────────────────────────
        location / {
            root /var/www/geminivpn;
            try_files $uri $uri/ /index.html;
            limit_req zone=general burst=100 nodelay;

            # FIX: Hashed assets — 1 year immutable cache
            # Vite generates content-hash filenames — safe to cache forever
            location ~* \.(js|css|woff|woff2|ttf)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
                add_header Vary "Accept-Encoding";
                access_log off;
            }

            # Images — 30 days (content may update without hash)
            location ~* \.(png|jpg|jpeg|gif|ico|svg|webp|avif)$ {
                expires 30d;
                add_header Cache-Control "public, must-revalidate";
                access_log off;
            }

            # HTML + SW — never cache
            location ~* \.(html|htm)$ {
                expires -1;
                add_header Cache-Control "no-cache, must-revalidate";
            }

            location = /sw.js {
                expires -1;
                add_header Cache-Control "no-cache, no-store, must-revalidate";
            }
        }
    }
}
