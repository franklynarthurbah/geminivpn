# GeminiVPN — Production Docker Compose
# Usage: docker compose -f docker/docker-compose.yml --env-file ../.env up -d

services:

  postgres:
    image: postgres:16-alpine
    container_name: geminivpn-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${DB_USER:-geminivpn}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-geminivpn_db_pass}
      POSTGRES_DB:       ${DB_NAME:-geminivpn}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d:ro
    networks:
      - geminivpn-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-geminivpn}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: geminivpn-redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD:-geminivpn_redis_pass}
    volumes:
      - redis_data:/data
    networks:
      - geminivpn-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-geminivpn_redis_pass}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    image: geminivpn-backend
    container_name: geminivpn-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV:          production
      PORT:              5000
      DATABASE_URL:      postgresql://${DB_USER:-geminivpn}:${DB_PASSWORD:-geminivpn_db_pass}@postgres:5432/${DB_NAME:-geminivpn}
      REDIS_URL:         redis://:${REDIS_PASSWORD:-geminivpn_redis_pass}@redis:6379
      FRONTEND_URL:      ${FRONTEND_URL:-https://localhost}
      JWT_ACCESS_SECRET:  ${JWT_ACCESS_SECRET:-change_me_access_secret_32chars}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change_me_refresh_secret_32chars}
      STRIPE_SECRET_KEY:        ${STRIPE_SECRET_KEY:-sk_placeholder}
      STRIPE_PUBLISHABLE_KEY:   ${STRIPE_PUBLISHABLE_KEY:-pk_placeholder}
      STRIPE_WEBHOOK_SECRET:    ${STRIPE_WEBHOOK_SECRET:-whsec_placeholder}
      STRIPE_MONTHLY_PRICE_ID:  ${STRIPE_MONTHLY_PRICE_ID:-price_placeholder}
      STRIPE_YEARLY_PRICE_ID:   ${STRIPE_YEARLY_PRICE_ID:-price_placeholder}
      STRIPE_TWO_YEAR_PRICE_ID: ${STRIPE_TWO_YEAR_PRICE_ID:-price_placeholder}
      SMTP_HOST:   ${SMTP_HOST:-smtp.placeholder.com}
      SMTP_PORT:   ${SMTP_PORT:-587}
      SMTP_USER:   ${SMTP_USER:-noreply@example.com}
      SMTP_PASS:   ${SMTP_PASS:-placeholder}
      WIREGUARD_ENABLED:            ${WIREGUARD_ENABLED:-false}
      WIREGUARD_SERVER_PRIVATE_KEY: ${WIREGUARD_SERVER_PRIVATE_KEY:-placeholder_wg_key}
      WIREGUARD_SUBNET:             ${WIREGUARD_SUBNET:-10.8.0.0/24}
      WIREGUARD_PORT:               ${WIREGUARD_PORT:-51820}
      SERVER_PUBLIC_IP:             ${SERVER_PUBLIC_IP:-167.71.197.103}
      WHATSAPP_SUPPORT_NUMBER:      ${WHATSAPP_SUPPORT_NUMBER:-+905368895622}
      ENABLE_SELF_HEALING:          ${ENABLE_SELF_HEALING:-false}
      DOWNLOADS_DIR:                /app/downloads
      IOS_APP_STORE_URL:            ${IOS_APP_STORE_URL:-https://apps.apple.com/app/geminivpn}
      DEMO_DURATION_MINUTES:        ${DEMO_DURATION_MINUTES:-60}
      BCRYPT_ROUNDS:                ${BCRYPT_ROUNDS:-12}
      TRIAL_DURATION_DAYS:          ${TRIAL_DURATION_DAYS:-3}
    volumes:
      - wireguard_configs:/app/wireguard-configs
      - /var/www/geminivpn/downloads:/app/downloads:ro
      - /var/log/geminivpn:/var/log/geminivpn
    networks:
      - geminivpn-network
    ports:
      - "51820:51820/udp"
    cap_add:
      - NET_ADMIN
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      start_period: 120s
      retries: 5

  nginx:
    image: nginx:1.25-alpine
    container_name: geminivpn-nginx
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # pre-start.sh: generates self-signed cert if LE cert missing so nginx
    # ALWAYS starts — visitors never see a blank page on first deploy
    entrypoint: ["/bin/sh", "/etc/nginx/pre-start.sh"]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/pre-start.sh:/etc/nginx/pre-start.sh:ro
      - /var/www/geminivpn:/var/www/geminivpn
      - /etc/letsencrypt:/etc/letsencrypt
      - /var/www/certbot:/var/www/certbot:ro
      - nginx_ssl:/etc/nginx/ssl
      - nginx_logs:/var/log/nginx
    networks:
      - geminivpn-network
    healthcheck:
      test: ["CMD", "curl", "-fk", "https://localhost/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 5

networks:
  geminivpn-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  wireguard_configs:
  nginx_logs:
  nginx_ssl:
